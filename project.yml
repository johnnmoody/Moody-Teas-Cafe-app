name: MoodyTeas
options:
  bundleIdPrefix: co.moodyteas
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: NO

targets:
  MoodyTeas:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MoodyTeas
    resources:
      - path: MoodyTeas/Assets.xcassets
    entitlements:
      path: MoodyTeas/MoodyTeas.entitlements
    info:
      path: MoodyTeas/Info.plist
      properties:
        CFBundleName: Moody Teas
        CFBundleDisplayName: Moody Teas
        CFBundleIdentifier: co.moodyteas.cafe
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UIMainStoryboardFile: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UILaunchScreen:
          UIColorName: LaunchBackground
        NSFaceIDUsageDescription: Used to keep your account secure
        NSCameraUsageDescription: Used to scan QR codes
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - moodyteas
            CFBundleURLName: co.moodyteas.cafe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.moodyteas.cafe
        DEVELOPMENT_TEAM: XFUQ46WL8D
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
        ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT: YES
        ENABLE_PREVIEWS: NO
        INFOPLIST_FILE: MoodyTeas/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

schemes:
  MoodyTeas:
    build:
      targets:
        MoodyTeas: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
